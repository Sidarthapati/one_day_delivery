name: PR Validation

# Advisory only. This check NEVER blocks a PR — it posts a friendly comment
# if the description looks thin, and cleans the comment up once it's filled in.
on:
  pull_request:
    types: [opened, edited, reopened]

jobs:
  validate-pr-body:
    name: PR Template Hint (non-blocking)
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write   # needed to post the advisory comment

    steps:
      - name: Check PR body (advisory)
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body ?? '';

            // Strip HTML comments and collapse whitespace → remaining prose.
            const prose = body
              .replace(/<!--[\s\S]*?-->/g, '')
              .replace(/\s+/g, ' ')
              .trim();

            // Anything that looks like a real Summary heading with text under it.
            const hasSummary = /##\s+Summary[\s\S]*?\n\s*\S/i.test(
              body.replace(/<!--[\s\S]*?-->/g, '')
            );

            const hints = [];
            if (prose.length < 20) {
              hints.push('The description is nearly empty — a sentence or two on **what** and **why** helps reviewers a lot.');
            }
            if (!hasSummary) {
              hints.push('Consider adding a short **## Summary** section so the intent is clear at a glance.');
            }

            // Locate any prior advisory comment from this workflow.
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });
            const existing = comments.find(
              c => c.user.login === 'github-actions[bot]' &&
                   c.body.startsWith('## PR Description Hint')
            );

            if (hints.length === 0) {
              // Nothing to flag — remove any stale hint and pass.
              if (existing) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                });
              }
              console.log('PR description looks good. (Advisory check — never blocks.)');
              return;
            }

            const comment = [
              '## PR Description Hint',
              '',
              '_Just a nudge — this does **not** block your PR. Tidy up if you like:_',
              '',
              ...hints.map(h => `- ${h}`),
            ].join('\n');

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: comment,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: comment,
              });
            }

            // Intentionally NOT calling core.setFailed — this check always passes.
            console.log('Posted advisory hint (non-blocking).');
