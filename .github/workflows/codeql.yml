name: CodeQL (SAST)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Full scan every Monday at 02:00 UTC
    - cron: '0 2 * * 1'

jobs:
  analyze:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      security-events: write   # required to upload results to the Security tab

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java
          # security-and-quality includes both vuln detection and code-smell queries
          queries: security-and-quality

      - name: Build for CodeQL (skip tests — analysis only)
        run: mvn clean install -DskipTests --batch-mode --no-transfer-progress

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:java
