# Shared TEAM-TESTING cluster. Confluent Cloud Basic by default; Redpanda Cloud also works
# (the Kafka wire protocol is identical — switching brokers is ENV-ONLY, no Java/topic changes).
# Activate with:  SPRING_PROFILES_ACTIVE=dev
# Secrets come from env vars (see .env, which is gitignored) — never commit real keys.
#
#   export KAFKA_BOOTSTRAP_SERVERS=<cluster-bootstrap>:9092
#   export KAFKA_SASL_MECHANISM=PLAIN            # Confluent; use SCRAM-SHA-256 for Redpanda
#   export KAFKA_JAAS_CONFIG='org.apache.kafka.common.security.plain.PlainLoginModule required username="<KEY>" password="<SECRET>";'
spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    properties:
      security.protocol: SASL_SSL
      sasl.mechanism: ${KAFKA_SASL_MECHANISM:PLAIN}
      sasl.jaas.config: ${KAFKA_JAAS_CONFIG}
