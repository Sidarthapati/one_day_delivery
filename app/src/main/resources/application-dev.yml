# Shared TEAM-TESTING broker — managed RabbitMQ on CloudAMQP.
# Activate with:  SPRING_PROFILES_ACTIVE=dev
# Secrets come from env vars (see .env, which is gitignored) — never commit real keys.
#
#   export CLOUDAMQP_URL='amqps://<user>:<pass>@<host>.rmq.cloudamqp.com/<vhost>'
#
# The amqps:// scheme makes Spring enable TLS (port 5671) and the trailing /<vhost> sets the
# CloudAMQP virtual host. The same `addresses` property serves the local Docker broker (plain
# amqp://guest:guest@localhost:5672) when CLOUDAMQP_URL is unset — switching brokers is ENV-ONLY.
spring:
  rabbitmq:
    addresses: ${CLOUDAMQP_URL}
