spring.application.name=one-day-delivery

# Database — defaults to local; override the env vars to point at the shared Render cluster.
# Real values live in .env (gitignored), loaded with: set -a && source .env && set +a
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/oneday}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:oneday}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:secret}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Flyway — subdirectory locations so V10 (app root) is not double-applied
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration/auth,classpath:db/migration,classpath:db/migration/orders
spring.flyway.baseline-on-migrate=true
spring.flyway.out-of-order=true
# M3 grid migrations were edited after initial apply — checksums mismatch locally
spring.flyway.validate-on-migrate=false

# RabbitMQ — default = local Docker broker; set CLOUDAMQP_URL (amqps://…) for the managed broker.
# The connection is lazy: if no broker is reachable the app still boots and serves HTTP (producers
# are best-effort via EventPublisher; listener containers retry in the background).
spring.rabbitmq.addresses=${CLOUDAMQP_URL:amqp://guest:guest@localhost:5672}
spring.rabbitmq.listener.simple.acknowledge-mode=auto
spring.rabbitmq.listener.simple.prefetch=10
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.initial-interval=1000ms
# Don't fail startup if a queue isn't declared yet (topology beans declare them on a live broker).
spring.rabbitmq.listener.simple.missing-queues-fatal=false

# auth.local.AuthLocalApplication registers the same JPA repos when the monolith
# component-scans com.oneday.* — safe to allow; last registration wins (identical class).
# Also prevents GlobalExceptionHandler bean name clash between auth and orders modules.
spring.main.allow-bean-definition-overriding=true

# JWT
jwt.secret=change-me-in-production-must-be-at-least-32-characters-long
jwt.expiry-hours=8

# Logging
logging.level.com.oneday=INFO
