spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/oneday
    username: oneday
    password: secret
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations:
      - classpath:db/migration/auth
      - classpath:db/migration/grid
      - classpath:db/migration/orders
  jackson:
    property-naming-strategy: SNAKE_CASE
